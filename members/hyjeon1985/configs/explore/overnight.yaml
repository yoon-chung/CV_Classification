# @package _global_
defaults:
  - default
  - _self_

explore:
  strategy: overnight
  job_timeout_sec: 3600
  max_jobs: 0
  run_dummy: false
  upload:
    each_stage: true
  constraints:
    allow_mix_with_label_smoothing: false
  selection:
    topk: 2
  stages:
    - name: stage1
      stop_after: eval
      train_batch_size: 16
      train_epochs: 2
      cache:
        enabled: false
        key_fields: []
        artifacts: [checkpoint]
    - name: stage2
      stop_after: eval
      train_batch_size: 16
      train_epochs: 6
      fold_indices: [0, 1, 2, 3, 4]
      queue_mode: tree_parent_first
      pruning:
        enabled: true
        metric_key: macro_f1
        min_value: 0.85
        best_margin: 0.03
        warmup_parents: 1
        max_fold_std: 0.03
        max_overfit_gap: 0.08
        max_val_loss: 0.45
      cache:
        enabled: false
        key_fields: []
        artifacts: [checkpoint]
    - name: stage3
      stop_after: infer
      train_batch_size: 16
      train_epochs: 8
      fold_indices: [0, 1, 2, 3, 4]
      cache:
        enabled: false
        key_fields: []
        artifacts: [checkpoint]
  matrix:
    model.backbone:
      - tf_efficientnetv2_s
      - convnext_small.fb_in22k_ft_in1k
    preprocess.target_size:
      - 320
      - 384
    optimizer.lr:
      - 1e-4
      - 3e-4
    augmentation.preset:
      - baseline
      - explore_v1
      - explore_quality_shift_v1
    augmentation.mix:
      - none
      - mixup
      - cutmix
    train.label_smoothing:
      - 0.0
      - 0.1
    train.seed:
      - 42
      - 77
    train.class_weight_mode:
      - balanced
      - none
