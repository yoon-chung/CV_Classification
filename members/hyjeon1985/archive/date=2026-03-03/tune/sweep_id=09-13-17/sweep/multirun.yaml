hydra:
  run:
    dir: ${logging.save_dir}/${runner.profile}/date=${now:%Y-%m-%d}/run_id=${runner.run_id}
  sweep:
    dir: ${logging.save_dir}/${runner.profile}/date=${now:%Y-%m-%d}/sweep_id=${now:%H-%M-%S}
    subdir: run_id=${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      optimizer.lr: choice(1e-4,1.3e-4)
      optimizer.weight_decay: choice(5e-3,1e-2)
      augmentation.mix: choice(none,mixup)
      train.label_smoothing: choice(0.0)
      train.class_weight_mode: choice(none,balanced)
      scheduler.name: choice(none,cosine)
      split.fold_index: choice(0,1)
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks:
    tune:
      _target_: experiment.tune.callbacks.TuneReportCallback
      results_csv: tune_results.csv
      summary_json: tune_summary.json
  output_subdir: .hydra
  overrides:
    hydra: []
    task:
    - scenario=cloud
    - runner_profile=hpc_proxy
    - kind=tune
    - tune=team_tune
    - train.num_workers=4
    - train.amp=true
  job:
    name: app
    chdir: false
    override_dirname: kind-tune__runner_profile-hpc_proxy__scenario-cloud__train.amp-true__train.num_workers-4__tune-team_tune
    id: ???
    num: ???
    config_name: experiment
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '-'
        item_sep: __
        exclude_keys:
        - hydra.mode
        - runner.resume
        - runner.dummy_data
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/jhoya/Workspaces/ai-22-cv-cv-team1
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/jhoya/Workspaces/ai-22-cv-cv-team1/members/hyjeon1985/configs
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      kind: tune
      tune: team_tune
      runner_profile: hpc_proxy
      scenario: cloud
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
runner:
  run_id: ${oc.env:RUN_ID,${now:%H-%M-%S}}
  resume: false
  dummy_data: false
  profile: hpc_proxy
  queue:
    strategy: fifo
  max_concurrency: ${oc.decode:${oc.env:MAX_CONCURRENCY,1}}
pipeline:
  step: full
  stop_after: eval
  cache:
    enabled: false
    root: ${oc.env:CACHE_DIR,${oc.env:ROOT_DIR}/cache}
    namespace: ${oc.env:CVDC_CACHE_NAMESPACE,cvdc}
    salt:
      manual: ${oc.env:CVDC_CACHE_VERSION,"v1"}
      code: ${oc.env:CVDC_CODE_SALT,null}
      data: ${oc.env:CVDC_DATA_SALT,null}
train:
  seed: 42
  epochs: 10
  batch_size: 24
  grad_accum_steps: 1
  amp: true
  label_smoothing: 0.1
  class_weight_mode: none
  early_stop:
    enabled: true
    monitor: val/macro_f1
    mode: max
    patience: 2
    min_delta: 0.0005
    warmup_epochs: 2
  num_workers: 4
model:
  backbone: convnext_small.fb_in22k_ft_in1k
  pretrained: true
  num_classes: 17
optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.01
scheduler:
  name: none
  warmup_epochs: 1
  min_lr: 1.0e-06
  step_size: 3
  gamma: 0.1
  max_lr: 0.001
preprocess:
  target_size: 384
  padding_pos: center
augmentation:
  preset: explore_v1
  mix: none
  color_jitter: true
  random_crop: true
split:
  strategy: stratified_kfold
  n_splits: 5
  fold_index: 0
  holdout_ratio: 0.2
  seed: 42
  group_key: group_key
dataset:
  data_root: ${oc.env:DATA_DIR,data}
  train_csv: ${dataset.data_root}/train.csv
  test_csv: ${dataset.data_root}/test.csv
  image_dir_train: ${dataset.data_root}/train
  image_dir_test: ${dataset.data_root}/test
  image_extensions:
  - .jpg
  - .png
  - .jpeg
logging:
  save_dir: ${oc.env:RUNS_DIR,${oc.env:ROOT_DIR}/outputs}
wandb:
  mode: online
  dir: ${logging.save_dir}
  log_interval: epoch
  log_every_n_steps: 50
  metrics:
  - train/loss
  - val/loss
  - val/macro_f1
  - train/lr
  - train/best_val_macro_f1
  - train/elapsed_sec
  - selection/val_macro_f1
  - selection/val_loss
  - selection/overfit_gap
  - selection/score_proxy
  - tune/val_macro_f1
  - tune/overfit_gap
  summary_keys:
  - tune/val_macro_f1
  - tune/val_loss
  - tune/overfit_gap
  - tune/best_val_macro_f1
  - tune/early_stopped
  - tune/train_elapsed_sec
  project: ${oc.env:WANDB_PROJECT,cv-doc-class}
  entity: ${oc.env:WANDB_ENTITY,null}
  group: ${oc.env:WANDB_GROUP,team_tune_${now:%Y%m%d_%H%M%S}}
  artifacts:
    enabled: false
  tags:
  - tune
  - team_tune
  - overnight
  - aggressive
preflight:
  mode: warn
  ruleset: confirm
submission:
  eval_contracts: []
upload:
  s3:
    enabled: false
    bucket: ${oc.env:S3_BUCKET,null}
    prefix: ${oc.env:S3_PREFIX,""}
plugins:
  augment:
    mode: preset
    preset_key: ${augmentation.preset}
    _target_: ''
  loss:
    mode: builtin
    name: cross_entropy
    _target_: ''
  sampler:
    enabled: false
    name: ''
    _target_: ''
  ensemble:
    enabled: false
    name: weighted_mean
    _target_: ''
experiment:
  scenario: cloud
  description: 'Team tune: overnight search around team_valid full_train winner (m_150b70658d)'
  kind: tune
artifacts:
  level: minimal
sweep:
  risk_note: Hydra multirun is lazy-composed. Do not edit code/config during active
    sweep.
tune:
  selection:
    topk: 8
  selector:
    std_weight: 0.3
    overfit_gap_threshold: 0.02
    overfit_weight: 1.3
    fail_weight: 0.8
  lineage:
    enabled: true
spec_version: 1
